<!DOCTYPE html>
<html>

<head>

<title>Predict Osteoporosis Risk</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family: Arial, sans-serif;
background:#f4f6f9;
overflow:hidden;
}

/* Header */

header{
background:#2c3e50;
color:white;
padding:14px;
text-align:center;
font-size:26px;
font-weight:bold;
position:relative;
}

/* Logout button */

.logout-container{
position:absolute;
right:25px;
top:12px;
}

.logout-btn{
background:#e74c3c;
color:white;
border:none;
padding:8px 16px;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

.logout-btn:hover{
background:#c0392b;
}

/* Container */

.container{
width:88%;
margin:auto;
margin-top:8px;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0px 0px 12px rgba(0,0,0,0.12);
height:calc(100vh - 80px);
}

/* Title */

.container h2{
margin-bottom:15px;
font-size:28px;
}

/* Grid */

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

/* Form groups */

.form-group{
display:flex;
flex-direction:column;
}

.form-group label{
font-weight:bold;
margin-bottom:5px;
font-size:17px;
color:#2c3e50;
}

.form-group input,
.form-group select{
padding:11px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

/* Buttons */

.button-row{
display:flex;
gap:16px;
margin-top:18px;
}

button{
flex:1;
padding:14px;
border:none;
border-radius:9px;
font-size:18px;
cursor:pointer;
}

.predict-btn{
background:#27ae60;
color:white;
}

.predict-btn:hover{
background:#1e8449;
}

.back-btn{
background:#3498db;
color:white;
}

.back-btn:hover{
background:#2980b9;
}

/* Guide */

.guide{
margin-top:12px;
background:#ecf0f1;
padding:12px;
border-radius:10px;
}

.guide h3{
margin-bottom:5px;
font-size:16px;
}

.guide ul{
padding-left:18px;
font-size:15px;
line-height:1.5;
}

.guide li{
margin-bottom:4px;
}

</style>

</head>

<body>

<header>

Patient Osteoporosis Risk Prediction

<div class="logout-container">
<a href="/logout">
<button class="logout-btn">Logout</button>
</a>
</div>

</header>

<div class="container">

<h2>Enter Patient Clinical Measurements</h2>

<form id="predictionForm">

<div class="form-grid">

<div class="form-group">
<label>Age</label>
<input type="number" id="age" placeholder="Example: 65" required>
</div>

<div class="form-group">
<label>Gender</label>
<select id="gender">
<option value="0">Female</option>
<option value="1">Male</option>
</select>
</div>

<div class="form-group">
<label>Select Bone for Analysis</label>
<select id="boneType">
<option value="Hip">Hip</option>
<option value="Spine">Spine</option>
<option value="Wrist">Wrist</option>
<option value="Knee">Knee</option>
</select>
</div>

<div class="form-group">
<label>BMI (Body Mass Index)</label>
<input type="number" step="0.1" id="bmi" placeholder="Healthy range: 18.5 - 24.9" required>
</div>

<div class="form-group">
<label>Bone Density</label>
<input type="number" step="0.01" id="boneDensity" placeholder="Healthy: above 0.75" required>
</div>

<div class="form-group">
<label>Calcium Intake (mg/day)</label>
<input type="number" id="calcium" placeholder="Recommended: 1000 - 1200">
</div>

<div class="form-group">
<label>Vitamin D Level (IU/day)</label>
<input type="number" id="vitaminD" placeholder="Recommended: 600 - 800">
</div>

</div>

<div class="button-row">

<button class="predict-btn" type="submit">
Predict Osteoporosis Risk
</button>

<button class="back-btn" type="button" onclick="window.location.href='/dashboard'">
Back to Dashboard
</button>

</div>

</form>

<div class="guide">

<h3>Measurement Guide</h3>

<ul>

<li><b>BMI:</b> Healthy range is 18.5 – 24.9</li>

<li><b>Bone Density:</b> Values below 0.60 indicate high osteoporosis risk</li>

<li><b>Calcium Intake:</b> Recommended 1000–1200 mg/day</li>

<li><b>Vitamin D:</b> Recommended 600–800 IU/day</li>

</ul>

</div>

</div>

<script src="{{ url_for('static', filename='js/upload.js') }}"></script>

</body>

</html>
