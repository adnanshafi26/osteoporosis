<!DOCTYPE html>
<html>

<head>

<title>Osteoporosis Prediction Result</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f6f9;
}

header{
background:#2c3e50;
color:white;
padding:12px;
text-align:center;
}

.container{
width:650px;
margin:auto;
margin-top:40px;
background:white;
padding:35px;
border-radius:10px;
box-shadow:0px 0px 12px rgba(0,0,0,0.1);
text-align:center;
}

.result-box{
margin-top:20px;
padding:20px;
border-radius:8px;
font-size:20px;
font-weight:bold;
}

.high-risk{
background:#fdecea;
color:#c0392b;
border:2px solid #e74c3c;
}

.low-risk{
background:#eafaf1;
color:#27ae60;
border:2px solid #2ecc71;
}

.fracture-box{
margin-top:15px;
padding:15px;
border-radius:8px;
background:#fff3cd;
color:#856404;
border:2px solid #ffeeba;
font-weight:bold;
}

.multi-bone{
margin-top:20px;
padding:15px;
background:#e8f4ff;
border-radius:8px;
text-align:left;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#3498db;
color:white;
cursor:pointer;
margin-top:20px;
font-size:15px;
}

button:hover{
background:#2980b9;
}

.download-btn{
background:#27ae60;
}

.download-btn:hover{
background:#1e8449;
}

.logout-container{
position:absolute;
top:20px;
right:30px;
}

.logout-btn{
background:#e74c3c;
color:white;
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

.logout-btn:hover{
background:#c0392b;
}

</style>

</head>

<body>

<header>
<h1>Osteoporosis Prediction Result</h1>
</header>

<div class="container">

<h2>AI Prediction</h2>

<div id="boneChecked" style="font-weight:bold;margin-top:10px;"></div>

<div id="predictionBox" class="result-box">
Loading...
</div>

<div id="fractureBox" class="fracture-box"></div>

<div class="logout-container">
<a href="/logout">
<button class="logout-btn">Logout</button>
</a>
</div>

<!-- Disease Detection -->

<div class="multi-bone">

<h3>Detected Bone Diseases</h3>

<ul id="diseaseList"></ul>

</div>


<!-- Multi Bone Analysis -->

<div class="multi-bone">

<h3>Multi-Bone Analysis</h3>

<ul>
<li>Hip: <span id="hipRisk">-</span></li>
<li>Spine: <span id="spineRisk">-</span></li>
<li>Wrist: <span id="wristRisk">-</span></li>
<li>Knee: <span id="kneeRisk">-</span></li>
</ul>

<h4 id="overallBoneHealth"></h4>

</div>


<!-- Buttons -->

<button class="download-btn" onclick="downloadReport()">
Download Medical Report
</button>

<br>

<button onclick="goDashboard()">Back to Dashboard</button>

</div>


<script>

function goDashboard(){
window.location="/dashboard";
}


document.addEventListener("DOMContentLoaded", function(){

let result = localStorage.getItem("predictionResult");
let fracture = localStorage.getItem("fractureRisk");
let selectedBone = localStorage.getItem("selectedBone");

let box = document.getElementById("predictionBox");
let fractureBox = document.getElementById("fractureBox");

/* Bone checked */

if(selectedBone){
document.getElementById("boneChecked").innerText =
"Bone Checked: " + selectedBone;
}

/* Prediction */

if(result){

box.innerText = result;

if(result.includes("High")){
box.classList.add("high-risk");
}else{
box.classList.add("low-risk");
}

}else{
box.innerText = "Prediction not available";
}

/* Fracture risk */

if(fracture){
fractureBox.innerText = "Future Fracture Risk: " + fracture;
}

/* Disease detection */

let diseases = JSON.parse(localStorage.getItem("boneDiseases") || "[]");

let diseaseList = document.getElementById("diseaseList");

if(diseases.length > 0){

diseaseList.innerHTML="";

diseases.forEach(function(d){

let li = document.createElement("li");
li.innerText = d;
diseaseList.appendChild(li);

});

}else{

let li = document.createElement("li");
li.innerText="No major bone diseases detected";
diseaseList.appendChild(li);

}

/* Multi bone analysis */

let hip = localStorage.getItem("hipRisk");
let spine = localStorage.getItem("spineRisk");
let wrist = localStorage.getItem("wristRisk");
let knee = localStorage.getItem("kneeRisk");
let overall = localStorage.getItem("overallBoneHealth");

if(hip) document.getElementById("hipRisk").innerText = hip;
if(spine) document.getElementById("spineRisk").innerText = spine;
if(wrist) document.getElementById("wristRisk").innerText = wrist;
if(knee) document.getElementById("kneeRisk").innerText = knee;

if(overall){
document.getElementById("overallBoneHealth").innerText =
"Overall Bone Health: " + overall;
}

/* Highlight selected bone */

let boneMap = {
"Hip":"hipRisk",
"Spine":"spineRisk",
"Wrist":"wristRisk",
"Knee":"kneeRisk"
};

if(selectedBone && boneMap[selectedBone]){

let element = document.getElementById(boneMap[selectedBone]);

element.style.fontWeight="bold";
element.style.color="#e74c3c";

}

});


/* Download report */

function downloadReport(){

fetch("/download_patient_report",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

bone: localStorage.getItem("selectedBone"),
prediction: localStorage.getItem("predictionResult"),
fracture_risk: localStorage.getItem("fractureRisk"),

age: localStorage.getItem("age"),
gender: localStorage.getItem("gender"),
bmi: localStorage.getItem("bmi"),
bone_density: localStorage.getItem("boneDensity"),
calcium: localStorage.getItem("calcium"),
vitamin_d: localStorage.getItem("vitaminD"),

diseases: JSON.parse(localStorage.getItem("boneDiseases") || "[]")

})

})

.then(res => res.json())

.then(data => {

window.open(data.report)

})

.catch(err => {

alert("Report generation failed")
console.log(err)

})

}

</script>

</body>
</html>
